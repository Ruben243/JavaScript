<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Sudoku - Lumo Project</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --board-bg: #ffffff;
            --border-color: #34495e;
            --thick-border: #2c3e50;
            --cell-size: 50px;
            --highlight: #e3f2fd;
            --error: #ffebee;
            --text-error: #c62828;
            --fixed-num: #2c3e50;
            --user-num: #1976d2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: var(--thick-border);
            margin-bottom: 20px;
        }

        /* Contenedor del Tablero */
        .sudoku-container {
            background: var(--board-bg);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, var(--cell-size));
            grid-template-rows: repeat(9, var(--cell-size));
            gap: 1px;
            border: 2px solid var(--thick-border);
            background-color: var(--border-color);
        }

        /* Celdas individuales */
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            background-color: white;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
            outline: none;
        }

        .cell:focus {
            background-color: var(--highlight);
        }

        /* Bordes gruesos para las subcuadrículas 3x3 */
        .cell:nth-child(3n) {
            border-right: 2px solid var(--thick-border);
        }

        .cell:nth-child(9n) {
            border-right: none;
        }

        /* Eliminar borde derecho del final */

        /* Truco para bordes inferiores gruesos: usamos clases generadas por JS o selectores específicos */
        .cell.border-bottom {
            border-bottom: 2px solid var(--thick-border);
        }

        /* Estilos para números fijos vs ingresados */
        .cell.fixed {
            color: var(--fixed-num);
            background-color: #ecf0f1;
            cursor: default;
        }

        .cell.user-input {
            color: var(--user-num);
        }

        .cell.error {
            background-color: var(--error);
            color: var(--text-error);
        }

        /* Controles */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: var(--user-num);
            color: white;
            transition: transform 0.1s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        button.secondary {
            background-color: #7f8c8d;
        }

        button.check {
            background-color: #27ae60;
        }

        #status {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            height: 24px;
        }
    </style>
</head>

<body>

    <h1>Sudoku JS</h1>

    <div class="sudoku-container">
        <div id="grid" class="grid"></div>
    </div>

    <div class="controls">
        <button onclick="generarNuevo()" class="secondary">Nuevo Juego</button>
        <button onclick="verificarSolucion()" class="check">Verificar</button>
        <button onclick="limpiarTablero()" class="secondary">Limpiar</button>
    </div>

    <div id="status"></div>

    <script>
        // --- LÓGICA DEL JUEGO ---

        // Tablero inicial (0 = vacío)
        const tableroInicial = [
            [5, 3, 0, 0, 7, 0, 0, 0, 0],
            [6, 0, 0, 1, 9, 5, 0, 0, 0],
            [0, 9, 8, 0, 0, 0, 0, 6, 0],
            [8, 0, 0, 0, 6, 0, 0, 0, 3],
            [4, 0, 0, 8, 0, 3, 0, 0, 1],
            [7, 0, 0, 0, 2, 0, 0, 0, 6],
            [0, 6, 0, 0, 0, 0, 2, 8, 0],
            [0, 0, 0, 4, 1, 9, 0, 0, 5],
            [0, 0, 0, 0, 8, 0, 0, 7, 9]
        ];

        let tableroActual = [];

        // Inicializar al cargar
        window.onload = () => {
            generarNuevo();
        };

        function generarNuevo() {
            // Copiamos el tablero inicial para no modificar el original
            tableroActual = JSON.parse(JSON.stringify(tableroInicial));
            renderizarTablero();
            document.getElementById('status').textContent = "";
            document.getElementById('status').style.color = "black";
        }

        function renderizarTablero() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; // Limpiar grid anterior

            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const input = document.createElement('input');
                    input.type = 'text'; // Usamos text para controlar mejor la entrada
                    input.maxLength = 1;
                    input.className = 'cell';

                    // Añadir borde inferior grueso cada 3 filas (excepto la última)
                    if ((i + 1) % 3 === 0 && i < 8) {
                        input.classList.add('border-bottom');
                    }

                    const valor = tableroActual[i][j];

                    if (valor !== 0) {
                        input.value = valor;
                        input.readOnly = true;
                        input.classList.add('fixed');
                    } else {
                        input.classList.add('user-input');
                        // Evento para validar entrada (solo números 1-9)
                        input.addEventListener('input', (e) => {
                            const val = e.target.value;
                            if (!/^[1-9]$/.test(val)) {
                                e.target.value = ''; // Borrar si no es 1-9
                            }
                            // Quitar clase error al escribir
                            e.target.classList.remove('error');
                        });

                        // Permitir navegación con flechas (opcional, mejora UX)
                        input.addEventListener('keydown', (e) => manejarFlechas(e, i, j));
                    }

                    grid.appendChild(input);
                }
            }
        }

        // Función auxiliar para moverse con flechas (Mejora de UX)
        function manejarFlechas(e, row, col) {
            const grid = document.getElementById('grid');
            const cells = grid.querySelectorAll('.cell:not(.fixed)');
            const index = Array.from(cells).indexOf(e.target);

            let nextIndex = index;
            if (e.key === 'ArrowRight') nextIndex = index + 1;
            if (e.key === 'ArrowLeft') nextIndex = index - 1;
            if (e.key === 'ArrowDown') nextIndex = index + 8; // 9 celdas por fila, menos 1 fija? No, es más complejo. Simplificado:
            // Para simplificar, dejaremos que el usuario haga click o use tab. 
            // Implementar navegación completa requiere calcular índices exactos saltando fixed.
        }

        function verificarSolucion() {
            const inputs = document.querySelectorAll('.cell.user-input');
            let hayErrores = false;
            let completado = true;

            // Resetear estilos de error
            inputs.forEach(input => input.classList.remove('error'));

            // Recopilar valores actuales
            let tableroUsuario = [];
            let inputsArray = Array.from(document.querySelectorAll('.cell'));

            // Reconstruir matriz desde el DOM
            for (let i = 0; i < 9; i++) {
                let fila = [];
                for (let j = 0; j < 9; j++) {
                    const cell = inputsArray[i * 9 + j];
                    const val = cell.value === '' ? 0 : parseInt(cell.value);
                    fila.push(val);
                    if (val === 0) completado = false;
                }
                tableroUsuario.push(fila);
            }

            if (!completado) {
                document.getElementById('status').textContent = "⚠️ El tablero no está completo.";
                document.getElementById('status').style.color = "#f39c12";
                return;
            }

            // Usamos la lógica de validación que creamos antes
            // Pero adaptada para marcar errores visuales
            const errores = obtenerErrores(tableroUsuario);

            if (errores.length === 0) {
                document.getElementById('status').textContent = "🎉 ¡Felicidades! Sudoku Resuelto Correctamente.";
                document.getElementById('status').style.color = "#27ae60";
            } else {
                document.getElementById('status').textContent = `❌ Se encontraron ${errores.length} errores.`;
                document.getElementById('status').style.color = "#c62828";

                // Marcar celdas erróneas
                errores.forEach(pos => {
                    const index = pos.fila * 9 + pos.col;
                    const cell = inputsArray[index];
                    if (!cell.classList.contains('fixed')) {
                        cell.classList.add('error');
                    }
                });
            }
        }

        // Lógica de validación (basada en tu ejercicio anterior)
        function obtenerErrores(tablero) {
            let errores = [];

            // Validar Filas
            for (let i = 0; i < 9; i++) {
                const vistos = new Set();
                for (let j = 0; j < 9; j++) {
                    const num = tablero[i][j];
                    if (num !== 0) {
                        if (vistos.has(num)) {
                            errores.push({ fila: i, col: j });
                        }
                        vistos.add(num);
                    }
                }
            }

            // Validar Columnas
            for (let j = 0; j < 9; j++) {
                const vistos = new Set();
                for (let i = 0; i < 9; i++) {
                    const num = tablero[i][j];
                    if (num !== 0) {
                        if (vistos.has(num)) {
                            errores.push({ fila: i, col: j });
                        }
                        vistos.add(num);
                    }
                }
            }

            // Validar Bloques 3x3
            for (let bf = 0; bf < 3; bf++) {
                for (let bc = 0; bc < 3; bc++) {
                    const vistos = new Set();
                    for (let i = 0; i < 3; i++) {
                        for (let j = 0; j < 3; j++) {
                            const r = bf * 3 + i;
                            const c = bc * 3 + j;
                            const num = tablero[r][c];
                            if (num !== 0) {
                                if (vistos.has(num)) {
                                    errores.push({ fila: r, col: c });
                                }
                                vistos.add(num);
                            }
                        }
                    }
                }
            }
            return errores;
        }

        function limpiarTablero() {
            const inputs = document.querySelectorAll('.cell.user-input');
            inputs.forEach(input => {
                input.value = '';
                input.classList.remove('error');
            });
            document.getElementById('status').textContent = "";
        }
    </script>
</body>

</html>
